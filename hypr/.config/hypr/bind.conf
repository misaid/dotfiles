
####################
### KEYBINDINGSS ###
####################
$terminal = ghostty
$fileManager = dolphin
# $menu = ulauncher-toggle

$menu = caelestia shell drawers toggle launcher
$browser =uwsm app -- app.zen_browser.zen 

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod, F, exec, $browser
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, T, exec, caelestia emoji -p
bind = $mainMod, space, exec, $menu
bind = SUPER_SHIFT, space, exec, ulauncher-toggle
bind = SUPER_SHIFT, Z, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, X, exec, /usr/share/hyprpanel/scripts/snapshot.sh
bind = SUPER, C, exec, kitty --class clipse -e clipse
# bind = $mainMod, C, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
# bind = SUPER_SHIFT, C, exec, ~/Scripts/preview_image.zsh
bind = $mainMod, n, exec, uwsm app -- nwg-drawer
# bind = $mainMod, G, exec, hyprlock
bind = $mainMod, G, exec, caelestia shell lock lock
# bind = $mainMod, G, exec, ./Scripts/swaylock.zsh
bind = SUPER_SHIFT, B, exec, /home/archmo/Scripts/connect.zsh

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u 
bind = $mainMod, J, movefocus, d
# Move with mainmod + shift + hjkl
bind = SUPER_ALT, H, movewindow, l
bind = SUPER_ALT, L, movewindow, r
bind = SUPER_ALT, K, movewindow, u
bind = SUPER_ALT, J, movewindow, d

# Swap with mainmod tab
bind = SUPER_SHIFT, H, swapwindow, l
bind = SUPER_SHIFT, L, swapwindow, r
bind = SUPER_SHIFT, K, swapwindow, u
bind = SUPER_SHIFT, J, swapwindow, d
# set fullscreen with mainmod shift m
bind = SUPER_SHIFT, M, fullscreen, 1
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

#special workspace (spotify)
bind = $mainMod, S, togglespecialworkspace, spotify
bind = $mainMod SHIFT, S, movetoworkspace, special:spotify
workspace = special:spotify, on-created-empty:spotify-launcher

#special workspace (obsidian)
bind = $mainMod, O, togglespecialworkspace, obsidian 
bind = $mainMod SHIFT, O, movetoworkspace, special:obsidian
workspace = special:obsidian, on-created-empty:md.obsidian.Obsidian

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel=, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# bindl=, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = ,XF86AudioMute, exec, playerctl --player=spotify play-pause
bindl = ,XF86AudioMute, exec, playerctl --player=cider play-pause
bindl = ,XF86AudioMute, exec, playerctl --player=ncspot play-pause

bindel= $mainMod, XF86AudioRaiseVolume, exec, playerctl --player=spotify volume 0.1+
bindel= $mainMod, XF86AudioLowerVolume, exec, playerctl --player=spotify volume 0.1-
bindel= $mainMod, XF86AudioRaiseVolume, exec, playerctl --player=cider volume 0.1+
bindel= $mainMod, XF86AudioLowerVolume, exec, playerctl --player=cider volume 0.1-
bindel= $mainMod, XF86AudioRaiseVolume, exec, playerctl --player=ncspot volume 0.1+
bindel= $mainMod, XF86AudioLowerVolume, exec, playerctl --player=ncspot volume 0.1-
# Test submap
# will switch to a submap called resize
bind = SUPER_ALT, R, submap, resize

# will start a submap called "resize"
submap = resize

# sets repeatable binds for resizing the active window
binde = , L, resizeactive, 40 0
binde = , H, resizeactive, -40 0
binde = , K, resizeactive, 0 -40
binde = , J, resizeactive, 0 40

# use reset to go back to the global submap
bind = , escape, submap, reset 

# will reset the submap, which will return to the global submap
submap = reset
