
# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# Set DP-2 as the main center monitor
monitor=DP-2,1920x1080@239.5,0x0,1

# Set DP-1 to the right of DP-2
monitor=HDMI-A-1,1920x1080@60,1920x0,1

monitor = DP-1 , preferred, 1920x1080@60, 1, mirror, DP-2

# Bind workspace 1 to monitor 1
workspace=1,monitor:DP-2

# Bind workspace 2 to monitor 1
workspace=2,monitor:DP-2, orientation:top

# Bind workspace 3 to monitor 1
workspace=3,monitor:DP-2

# Bind workspace 4 to monitor 1
workspace=4,monitor:DP-2

# Bind workspace 5 to monitor 1
workspace=5,monitor:DP-2

# Bind workspace 6 and 7 to monitor 2
workspace=6,monitor:HDMI-A-1
workspace=7,monitor:HDMI-A-1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$fileManager = dolphin
# $menu = wofi --show drun
$menu = ulauncher-toggle
$browser = app.zen_browser.zen 

# windowrule = float, ^(org.gnome.Calculator)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = move 67% 72%, title:^(Picture-in-Picture)$
windowrulev2 = size 33% 28%, title:^(Picture-in-Picture)$ 

# top right
# windowrulev2 = move 66.55% 4%, title:^(Picture-in-Picture)$
# windowrule2 = size 33% 28%, title:^(Picture-in-Picture)$ 

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec =uwsm gsettings set org.gnome.desktop.interface gtk-theme "Breeze-Dark"   # for GTK3 apps
exec =uwsm gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps
exec =uwsm hypridle
exec =uwsm ulauncher --hide-window --no-window-shadow

exec-once =uwsm sunshine
exec-once =uwsm hyprpanel
exec-once =uwsm nm-applet
exec-once =uwsm hyprctl setcursor BreezeX-RosePineDawn-Linux 24
exec-once =uwsm systemctl --user start plasma-polkit-agent
exec-once =uwsm ~/Scripts/nuke.sh
exec-once =uwsm wl-paste --type text --watch cliphist store # Stores only text data
exec-once =uwsm wl-paste --type image --watch cliphist store # Stores only image data
exec-once =uwsm clipse -listen
# exec-onceuwsm = swww init & swww restore
# Switch touwsm workspace 1 on startup
exec-once =uwsm hyprctl dispatch workspace 1
exec-once =uwsm dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once =uwsm wal -R
exec-once =uwsm pipfloat

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_CURRENT_DESKTOP,Hyprland
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = NVD_BACKEND,direct
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = QT_QPA_PLATFORMTHEME,qt5ct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

cursor {
	no_hardware_cursors = true
}
#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general { 
    gaps_in = 2
    gaps_out = 5

    border_size = 0

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    # col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    # col.inactive_border = rgba(595959aa)
    # col.active_border = rgba(89b4fa88) rgba(74c7ec88) 45deg
    col.inactive_border = rgba(45475a88)
    col.active_border = rgba(45475a88)
    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = true

    layout = dwindle
}
windowrulev2 = immediate, class:^(cs2)$

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 4

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    # inactive_opacity = .85555
    inactive_opacity = 1.0 

    # shadow = true
    # range = 4
    # render_power = 3
    # col.shadow = rgba(1a1a1aee)

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = 1 #-1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true #false # If true disables the random hyprland logo / anime girl background. :(
    vrr=0
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = caps:swapescape
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    workspace_swipe = false
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


####################
### KEYBINDINGSS ###
####################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec,uwsm $terminal
bind = $mainMod, W, killactive,
bind = $mainMod, F, exec,uwsm $browser
bind = $mainMod, M, exit,
bind = $mainMod, E, exec,uwsm $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, space, exec,uwsm $menu
bind = SUPER_SHIFT, Z, pseudo, # dwindle
bind = $mainMod, Z, togglesplit, # dwindle
bind = $mainMod, X, exec,uwsm /usr/share/hyprpanel/scripts/snapshot.sh
bind = SUPER, C, exec,uwsm kitty --class clipse -e clipse
# bind = $mainMod, C, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
# bind = SUPER_SHIFT, C, exec, ~/Scripts/preview_image.zsh
bind = $mainMod, G, exec,uwsm hyprlock
# bind = $mainMod, G, exec, ./Scripts/swaylock.zsh
bind = $mainMod, T, exec, uwsm com.tomjwatson.Emote
bind = SUPER_SHIFT, B, exec,uwsm /home/archmo/Scripts/connect.zsh

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u 
bind = $mainMod, J, movefocus, d
# Move with mainmod + shift + hjkl
bind = SUPER_ALT, H, movewindow, l
bind = SUPER_ALT, L, movewindow, r
bind = SUPER_ALT, K, movewindow, u
bind = SUPER_ALT, J, movewindow, d

# Swap with mainmod tab
bind = SUPER_SHIFT, H, swapwindow, l
bind = SUPER_SHIFT, L, swapwindow, r
bind = SUPER_SHIFT, K, swapwindow, u
bind = SUPER_SHIFT, J, swapwindow, d
# set fullscreen with mainmod shift m
bind = SUPER_SHIFT, M, fullscreen, 1
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

#special workspace (spotify)
bind = $mainMod, S, togglespecialworkspace,uwsm spotify
bind = $mainMod SHIFT, S, movetoworkspace, special:spotify
workspace = special:spotify, on-created-empty:spotify-launcher

#special workspace (obsidian)
bind = $mainMod, O, togglespecialworkspace,uwsm obsidian 
bind = $mainMod SHIFT, O, movetoworkspace, special:obsidian
workspace = special:obsidian, on-created-empty:obsidian

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel=, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# bindl=, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = ,XF86AudioMute, exec, playerctl --player=spotify play-pause
bindl = ,XF86AudioMute, exec, playerctl --player=cider play-pause

bindel= $mainMod, XF86AudioRaiseVolume, exec, playerctl --player=spotify volume 0.1+
bindel= $mainMod, XF86AudioLowerVolume, exec, playerctl --player=spotify volume 0.1-
bindel= $mainMod, XF86AudioRaiseVolume, exec, playerctl --player=cider volume 0.1+
bindel= $mainMod, XF86AudioLowerVolume, exec, playerctl --player=cider volume 0.1-
# Test submap
# will switch to a submap called resize
bind = SUPER_ALT, R, submap, resize

# will start a submap called "resize"
submap = resize

# sets repeatable binds for resizing the active window
binde = , L, resizeactive, 40 0
binde = , H, resizeactive, -40 0
binde = , K, resizeactive, 0 -40
binde = , J, resizeactive, 0 40

# use reset to go back to the global submap
bind = , escape, submap, reset 

# will reset the submap, which will return to the global submap
submap = reset

# keybinds further down will be global again...
##############################
### WINDOWS AND WORKSPACES ###
