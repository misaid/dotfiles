#################
### AUTOSTART ###
#################
# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec = gsettings set org.gnome.desktop.interface gtk-theme "Breeze-Dark"   # for GTK3 apps
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps
exec = uwsm app -- hypridle
# exec = kitty +kitten panel --edge=background bash -c "~/Projects/learnrust/cherish/target/debug/cherish"
# exec = ulauncher --hide-window --no-window-shadow

# exec-once = hyprpm reload -n
# exec-once = uwsm app -- ~/Scripts/librepods
exec-once = uwsm app -- sunshine
# exec-once uwsm app -- = hyprpanel
exec-once = uwsm app -- nm-applet
exec-once = uwsm app -- hyprctl setcursor BreezeX-RosePineDawn-Linux 24
exec-once = uwsm app -- systemctl --user start plasma-polkit-agent
exec-once = ~/Scripts/nuke.sh
exec-once = uwsm app -- caelestia shell -d
# exec-once uwsm app -- = ~/Scripts/set_vwall.zsh ~/Videos/Animated\ Wallpapers/yR4BPV29HYH6Mrd_Vagabond\ Manga\ Live\ Wallpaper_2_032940.mp4
exec-once = uwsm app -- wl-paste --type text --watch cliphist store # Stores only text data
exec-once = uwsm app -- wl-paste --type image --watch cliphist store # Stores only image data
exec-once = uwsm app -- clipse -listen
# exec-once uwsm app -- = swww init & swww restore
# Switch to uwsm app -- workspace 1 on startup
exec-once = hyprctl dispatch workspace 1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
