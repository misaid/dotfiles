[env]
TERM = "xterm-256color"

[window]
opacity = 0.9
decorations = "none"
blur = true

[general]
import = ["~/.config/alacritty/themes/themes/rose_pine_moon.toml"]

[font]
size = 12.0

[font.bold]
family = "0xProto Nerd Font Mono"
style = "Bold"

[font.bold_italic]
family = "0xProto Nerd Font Mono"
style = "Bold Italic"

[font.italic]
family = "0xProto Nerd Font Mono"
style = "Italic"

[font.normal]
family = "0xProto Nerd Font Mono"
style = "Regular"
